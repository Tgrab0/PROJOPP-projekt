<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Projekt Dino gra</title>
  <style>
    :root{
      --bg: #2c3e50;
      --container-bg: #87CEEB;
      --border: #333;
      --shadow: rgba(0,0,0,0.3);
      --font: system-ui, sans-serif;
    }

    html,body{
      height:100%; margin:0; display:flex; align-items:center; justify-content:center;
      background:var(--bg); font-family:var(--font); overflow: hidden;
    }

    /* Zwiększona rozdzielczość kontenera */
    #gameContainer{
      width:1000px; height:400px; border:6px solid var(--border); border-radius:12px;
      background:var(--container-bg); box-shadow:0 0 40px var(--shadow);
      position:relative; overflow:hidden;
    }

    canvas { display:block; width:100%; height:100%; background: linear-gradient(#87CEEB, #4da6ff); }

    .hud {
      position:absolute; top:15px; right:25px; text-align: right;
      font-weight:700; color:#fff; text-shadow: 1px 1px 2px #000; pointer-events:none; user-select:none;
      font-size: 20px; /* Większy font dla większej rozdzielczości */
    }
    
    #status { font-size: 16px; color: #ffeb3b; margin-top: 6px; }

    #menu {
      position:absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.95); border-radius:12px; padding:25px 35px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.4); text-align:center;
      display:flex; flex-direction:column; gap:10px; align-items:center; z-index: 10; min-width: 300px;
    }

    .btn-group { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    button {
      background:#2d5a27; color:#fff; border:none; padding:12px 16px;
      border-radius:8px; font-weight:700; cursor:pointer; transition: 0.2s; font-size: 16px;
    }
    button:hover { background: #3e7a36; transform: scale(1.05); }

    /* Responsywność dla mniejszych ekranów */
    @media (max-width:1050px){ #gameContainer { width:95%; height:350px; } }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="1000" height="400"></canvas>
    <div class="hud">
      <div id="scoreHud">Wynik: 0</div>
      <div id="status"></div>
    </div>
    <audio id="jumpSound" src="jump.mp3" preload="auto"></audio>
    <div id="menu">
      <h2 id="menuTitle">Desert Runner HD</h2>
      <p id="menuText">Wybierz poziom trudności:</p>
      <div id="mainMenu" class="btn-group">
        <button onclick="setDifficulty('easy')">Łatwy</button>
        <button onclick="setDifficulty('medium')">Średni</button>
        <button onclick="setDifficulty('hard')">Wysoki (Hardcore)</button>
        <button onclick="showControls()" style="background:#666;">Sterowanie</button>
      </div>
      <div id="controlsMenu" class="btn-group" style="display:none;">
        <p>⬆️ / SPACJA – skok | ⬇️ – kucanie</p>
        <button onclick="backToMenu()">Powrót</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const HUD = document.getElementById('scoreHud');
    const statusHUD = document.getElementById('status');
    const menu = document.getElementById('menu');
    const jumpSound = document.getElementById('jumpSound');
	
	
    let WIDTH, HEIGHT, GROUND_Y;
    let running = false, score = 0, speed = 7, baseSpeed = 7, gravity = 0.8;
    let obstacleTimer = 0, obstacleInterval = 85, cloudTimer = 0;
    
    let difficultySettings = { maxMultiplier: 1.5, acceleration: 0.15, puChance: 0 };

    const dino = {
      x: 80, y: 0, w: 45, h: 50, vy: 0, // Nieco większy dinozaur
      jumping: false, ducking: false,
      hasExtraLife: false, 
      shieldActive: false, shieldTimer: 0,
      demolitionActive: false, demolitionTimer: 0
    };

    let obstacles = [], clouds = [], particles = [], powerUps = [];

    function fitCanvas() {
      // Dynamicznie dopasowuje logikę do wielkości elementu, zachowując proporcje
      const rect = canvas.getBoundingClientRect();
      WIDTH = canvas.width; 
      HEIGHT = canvas.height; 
      GROUND_Y = HEIGHT - 50; // Podłoga nieco niżej
    }
    window.addEventListener('resize', fitCanvas);
    fitCanvas();

    function setDifficulty(level) {
      if(level === 'easy') {
        difficultySettings = { maxMultiplier: 1.5, acceleration: 0.12, puChance: 0.25 };
      } else if(level === 'medium') {
        difficultySettings = { maxMultiplier: 2.5, acceleration: 0.25, puChance: 0.10 };
      } else {
        difficultySettings = { maxMultiplier: 4.5, acceleration: 0.5, puChance: 0 };
      }
      startGame();
    }

    function spawnObstacle(){
      const rand = Math.random();
      if(rand < 0.25) {
        obstacles.push({ x: WIDTH + 60, y: GROUND_Y - 70, w: 50, h: 20, type: "hang", passed: false });
      } else {
        const segments = Math.random() < 0.6 ? 1 : (Math.random() < 0.8 ? 2 : 3);
        const segmentW = 20 + Math.random() * 10;
        const h = 40 + Math.random() * 30;
        obstacles.push({ x: WIDTH + 60, y: GROUND_Y - h, w: segmentW * segments, h: h, segmentW: segmentW, segments: segments, type: "ground", passed: false });
      }
    }

    function spawnPowerUp() {
      if(dino.shieldActive || dino.demolitionActive || dino.hasExtraLife) return;
      const type = Math.random() < 0.5 ? 'life' : 'demo';
      powerUps.push({
        x: WIDTH + 60, y: GROUND_Y - 35, w: 30, h: 30, type: type,
        color: type === 'life' ? '#e74c3c' : '#9b59b6'
      });
    }

    function spawnCloud(){
      clouds.push({ x: WIDTH + 100, y: 40 + Math.random() * 100, r: 20 + Math.random() * 20, vx: 0.5 + Math.random() });
    }

    function createExplosion(x, y, color) {
      for(let i=0; i<12; i++) {
        particles.push({ x: x, y: y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, a: 1, color: color });
      }
    }

    function update(){
      if(!running) return;

      if(dino.ducking) { dino.y = GROUND_Y - dino.h/2; dino.vy = 0; } 
      else { dino.vy += gravity; dino.y += dino.vy; }
      if(dino.y > GROUND_Y - dino.h) { dino.y = GROUND_Y - dino.h; dino.vy = 0; dino.jumping = false; }

      if(dino.shieldTimer > 0) {
        dino.shieldTimer--;
        if(dino.shieldTimer <= 0) dino.shieldActive = false;
      }
      if(dino.demolitionTimer > 0) {
        dino.demolitionTimer--;
        if(dino.demolitionTimer <= 0) dino.demolitionActive = false;
      }

      obstacleTimer++;
      if(obstacleTimer >= obstacleInterval) { spawnObstacle(); obstacleTimer = 0; }
      if(obstacleTimer === Math.floor(obstacleInterval / 2)) {
        if(Math.random() < difficultySettings.puChance) spawnPowerUp();
      }

      for(let i = obstacles.length - 1; i >= 0; i--) {
        let o = obstacles[i];
        o.x -= speed;

        let dX = dino.x + 5, dW = dino.w - 10, dH = dino.ducking ? dino.h / 2 : dino.h, dY = dino.ducking ? (GROUND_Y - dH) : dino.y;
        
        if (dX < o.x + o.w && dX + dW > o.x && dY < o.y + o.h && dY + dH > o.y) {
          if(dino.demolitionActive || dino.shieldActive) {
            createExplosion(o.x, o.y, '#2d5a27');
            obstacles.splice(i, 1);
            score++;
            continue;
          } else if(dino.hasExtraLife) {
            dino.hasExtraLife = false;
            dino.shieldActive = true;
            dino.shieldTimer = 5 * 60;
            createExplosion(o.x, o.y, '#e74c3c');
            obstacles.splice(i, 1);
            continue;
          } else {
            endGame();
          }
        }

        if(!o.passed && o.x < dino.x) {
          score++; o.passed = true;
          if(score % 10 === 0 && speed < baseSpeed * difficultySettings.maxMultiplier) {
            speed += difficultySettings.acceleration;
            if(obstacleInterval > 30) obstacleInterval -= 1;
          }
        }
        if(o.x + o.w < -100) obstacles.splice(i, 1);
      }

      for(let i = powerUps.length - 1; i >= 0; i--) {
        let p = powerUps[i];
        p.x -= speed;
        if (dino.x < p.x + p.w && dino.x + dino.w > p.x && dino.y < p.y + p.h && dino.y + dino.h > p.y) {
          if(p.type === 'life') dino.hasExtraLife = true;
          if(p.type === 'demo') { dino.demolitionActive = true; dino.demolitionTimer = 10 * 60; }
          powerUps.splice(i, 1);
        }
        else if(p.x + p.w < -100) powerUps.splice(i, 1);
      }

      cloudTimer++;
      if(cloudTimer > 180) { spawnCloud(); cloudTimer = 0; }
      clouds.forEach((c, i) => { c.x -= c.vx; if(c.x < -150) clouds.splice(i, 1); });
      for(let i = particles.length - 1; i >= 0; i--){
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.a -= 0.02;
        if(p.a <= 0) particles.splice(i,1);
      }
    }

    function draw(){
      ctx.clearRect(0,0,WIDTH,HEIGHT);
      
      // Chmury
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      clouds.forEach(c => { ctx.beginPath(); ctx.ellipse(c.x, c.y, c.r * 1.6, c.r, 0, 0, Math.PI*2); ctx.fill(); });
      
      // PODŁOGA
      ctx.fillStyle = '#edc9af'; 
      ctx.fillRect(0, GROUND_Y, WIDTH, HEIGHT - GROUND_Y);
      ctx.fillStyle = '#d2b48c';
      ctx.fillRect(0, GROUND_Y, WIDTH, 5);

      // DINO
      ctx.fillStyle = '#333';
      if(dino.ducking) { ctx.fillRect(dino.x, GROUND_Y - dino.h/2, dino.w, dino.h/2); } 
      else { ctx.fillRect(dino.x, dino.y, dino.w, dino.h); }

      // Power-up indicators
      if(dino.hasExtraLife) {
        ctx.fillStyle = '#e74c3c';
        ctx.font = "24px Arial"; ctx.fillText("❤️", dino.x + 10, dino.y - 20);
      }
      if(dino.shieldActive) {
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(dino.x + dino.w/2, dino.y + dino.h/2, 45, 0, Math.PI*2); ctx.stroke();
      }
      if(dino.demolitionActive) {
        ctx.strokeStyle = '#9b59b6'; ctx.lineWidth = 5;
        ctx.strokeRect(dino.x - 8, dino.y - 8, dino.w + 16, dino.h + 16);
      }

      powerUps.forEach(p => {
        ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = "white"; ctx.font = "bold 20px Arial"; ctx.fillText(p.type === 'life' ? "H" : "P", p.x + 7, p.y + 22);
      });

      obstacles.forEach(o => {
        if(o.type === "hang") { 
          ctx.fillStyle = "#000000"; 
          ctx.fillRect(o.x, o.y, o.w, o.h); 
        } else {
          ctx.fillStyle = "#2d5a27";
          for(let n = 0; n < o.segments; n++) { 
            ctx.fillRect(o.x + (n * o.segmentW) + 2, o.y, o.segmentW - 4, o.h); 
            ctx.fillStyle = "#ff4081";
            ctx.fillRect(o.x + (n * o.segmentW) + 8, o.y - 5, 8, 5);
            ctx.fillStyle = "#2d5a27";
          }
        }
      });

      particles.forEach(p => { ctx.globalAlpha = p.a; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 5, 5); });
      ctx.globalAlpha = 1.0;

      HUD.textContent = 'Wynik: ' + score;
      let statusText = "";
      if(dino.shieldActive) statusText = `TARCZA: ${(dino.shieldTimer/60).toFixed(1)}s`;
      if(dino.demolitionActive) statusText = `DEMOLKA: ${(dino.demolitionTimer/60).toFixed(1)}s`;
      statusHUD.textContent = statusText;
    }

    function loop(){ update(); draw(); if(running) requestAnimationFrame(loop); }

    function startGame(){
      if(running) return;
      obstacles = []; particles = []; powerUps = []; score = 0; speed = baseSpeed; obstacleInterval = 85;
      dino.y = GROUND_Y - dino.h; dino.hasExtraLife = false; dino.shieldActive = false; dino.demolitionActive = false;
      running = true; menu.style.display = 'none'; requestAnimationFrame(loop);
    }

    function endGame(){
      running = false; menu.style.display = 'flex';
      document.getElementById('menuTitle').textContent = 'Koniec gry!';
      document.getElementById('menuText').textContent = 'Wynik: ' + score;
    }

    function showControls() { document.getElementById('mainMenu').style.display = 'none'; document.getElementById('controlsMenu').style.display = 'flex'; }
    function backToMenu() { document.getElementById('mainMenu').style.display = 'flex'; document.getElementById('controlsMenu').style.display = 'none'; }
    
    function handleJump() { 
  if(!dino.jumping && !dino.ducking && running) { 
    dino.vy = -16; 
    dino.jumping = true;

    
    jumpSound.currentTime = 0;
    jumpSound.play();
  } 
}

    window.addEventListener('keydown', (e) => {
      if(e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); handleJump(); }
      if(e.code === 'ArrowDown') { e.preventDefault(); if(!dino.jumping) dino.ducking = true; }
    });
    window.addEventListener('keyup', (e) => { if(e.code === 'ArrowDown') dino.ducking = false; });
    canvas.addEventListener('mousedown', handleJump);
    draw();
  </script>
</body>
</html>
